name: Alertes Telegram

# Lance le script d'alerte 3×/jour, comme le cron local d'origine.
# Heures en UTC (l'été à Paris = UTC+2) → ~6h, 12h, 18h heure de Paris.
on:
  schedule:
    - cron: "0 4,10,16 * * *"
  workflow_dispatch:   # bouton manuel pour tester

permissions:
  contents: read

jobs:
  alerte:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests astral pytz

      - name: Envoyer les alertes Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python surf_alert.py
